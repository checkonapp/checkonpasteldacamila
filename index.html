<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>CheckON – Pastel da Camilla</title>
<link rel="icon" type="image/png" href="logo.png"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#EA1D2C;--brand-dark:#C0111E;--brand-light:#FFF0F1;--brand-mid:#F5333F;
  --bg:#F5F5F5;--surface:#FFFFFF;--surface2:#FAFAFA;--surface3:#F0F0F0;
  --ink:#111827;--ink2:#4B5563;--ink3:#9CA3AF;--ink4:#D1D5DB;
  --line:#E5E7EB;--line2:#F3F4F6;
  --ok:#16A34A;--ok-bg:#F0FDF4;--ok-line:#BBF7D0;
  --warn:#D97706;--warn-bg:#FFFBEB;--warn-line:#FDE68A;
  --danger:#DC2626;--danger-bg:#FEF2F2;--danger-line:#FECACA;
  --info:#0284C7;--info-bg:#F0F9FF;--info-line:#BAE6FD;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r20:20px;--r99:99px;
  --sh0:0 1px 2px rgba(0,0,0,.06);
  --sh1:0 1px 4px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --sh3:0 8px 24px rgba(0,0,0,.10),0 2px 8px rgba(0,0,0,.06);
  --sh-brand:0 4px 14px rgba(234,29,44,.30);
  --content-max:720px;
  --fab-h:68px;
}
html{font-size:14px;-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:calc(var(--fab-h) + 24px + env(safe-area-inset-bottom,0px))}
*{font-family:inherit}
button{cursor:pointer;border:none;outline:none;background:transparent;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
textarea,select,input{font-family:inherit}
a{color:inherit}
img{display:block;max-width:100%}
.login-bg{min-height:100vh;background:#EA1D2C;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-wrapper{width:100%;max-width:340px;animation:loginWrapIn .7s cubic-bezier(.34,1.4,.64,1) both;}
@keyframes loginWrapIn{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
.login-card{width:100%;background:#F5F1EF;border-radius:24px;box-shadow:0 16px 48px rgba(0,0,0,.28);position:relative;overflow:visible;}
.card-top{width:100%;height:80px;display:flex;justify-content:center;align-items:flex-start;position:relative;}
.card-arch-bg{position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:130px;height:130px;border-radius:50%;background:#fff;box-shadow:0 -4px 16px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;overflow:hidden;z-index:2;}
.card-arch-bg img{width:126px;height:126px;object-fit:contain;mix-blend-mode:multiply;filter:contrast(1.05) saturate(1.1);}
.card-arch-bg::after{content:'';position:absolute;inset:0;border-radius:50%;border:3px solid rgba(200,150,12,.4);pointer-events:none;}
.card-arch-fallback{font-size:64px;line-height:1;display:none;}
.card-body{padding:6px 24px 28px;}
.card-headline{font-family:'Sora',sans-serif;font-size:16px;font-weight:900;color:#1A1A1A;text-align:center;margin-bottom:4px;line-height:1.4;}
.card-headline em{font-style:italic;color:#EA1D2C}
.card-sub{font-size:11px;color:#AAA;text-align:center;margin-bottom:20px;}
.login-f-group{margin-bottom:11px}
.login-f-label{display:block;font-size:10px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.login-input-wrap{position:relative}
.login-input-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;opacity:.35;z-index:1;}
.login-f-input{width:100%;background:#fff;border:1.5px solid #E4DCDA;border-radius:10px;padding:12px 12px 12px 40px;font-size:14px;color:#1A1A1A;transition:border-color .2s,box-shadow .2s;outline:none;-webkit-appearance:none;}
.login-f-input::placeholder{color:#C0B8B6}
.login-f-input:focus{border-color:#EA1D2C;box-shadow:0 0 0 3px rgba(234,29,44,.1)}
.login-btn{width:100%;padding:14px;background:#EA1D2C;color:#fff;border-radius:10px;border:none;font-family:'Sora',sans-serif;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px;transition:background .15s,transform .1s;box-shadow:0 4px 14px rgba(234,29,44,.4);}
.login-btn:hover{background:#C0111E;transform:translateY(-1px)}
.login-btn:active{transform:translateY(0)}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.login-alert{background:#FEE2E2;border:1px solid #FECACA;color:#B91C1C;border-radius:10px;padding:9px 13px;font-size:12px;font-weight:600;margin-bottom:11px;text-align:center;}
.login-footer-txt{text-align:center;margin-top:14px;font-size:11px;color:rgba(255,255,255,.45);letter-spacing:.3px;}
@media(min-width:640px){.login-wrapper{max-width:320px}.login-card{border-radius:22px}}
.hdr{background:var(--brand);color:#fff;height:56px;padding:0 16px;display:flex;align-items:center;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(180,0,20,.28)}
.hdr-inner{width:100%;max-width:var(--content-max);margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
.hdr-right{display:flex;align-items:center;gap:6px}
.hdr-chip{background:rgba(255,255,255,.18);border-radius:var(--r99);padding:5px 12px;font-size:11px;font-weight:700}
.hdr-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.9);border-radius:var(--r99);padding:6px 13px;font-size:11px;font-weight:700;transition:background .13s;min-height:32px}
.hdr-btn:hover{background:rgba(255,255,255,.22)}
.day-badge{display:inline-flex;align-items:center;gap:7px;margin:14px 16px 0;background:var(--surface);border:1px solid var(--line);border-radius:var(--r99);padding:6px 14px;font-size:11px;font-weight:700;color:var(--ink2);box-shadow:var(--sh0)}
.day-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);flex-shrink:0}
.card{background:var(--surface);border-radius:var(--r12);border:1px solid var(--line);box-shadow:var(--sh1);padding:18px;margin:12px 16px 0}
.card-title{font-family:'Sora',sans-serif;font-size:13px;font-weight:800;color:var(--ink);margin-bottom:16px;display:flex;align-items:center;gap:7px}
.turno-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.turno-btn{padding:20px 14px;border-radius:var(--r12);border:2px solid var(--line);background:var(--surface);text-align:center;transition:all .15s;cursor:pointer;position:relative;overflow:hidden;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.turno-btn:hover{border-color:var(--brand-mid);background:var(--brand-light);transform:translateY(-2px)}
.turno-btn.active{border-color:var(--brand);background:var(--brand-light);box-shadow:var(--sh-brand)}
.turno-btn.active::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--brand)}
.turno-icon{font-size:28px;display:block;margin-bottom:8px}
.turno-label{font-family:'Sora',sans-serif;font-size:14px;font-weight:700;color:var(--ink2)}
.turno-btn.active .turno-label{color:var(--brand)}
.ctx-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line2)}
.ctx-row:last-child{border-bottom:none}
.ctx-q{font-size:13px;font-weight:500;color:var(--ink);flex:1;line-height:1.5}
.ctx-toggle{display:flex;gap:6px;flex-shrink:0}
.ctx-btn{padding:7px 16px;border-radius:var(--r99);border:1.5px solid var(--line);background:var(--surface);font-size:12px;font-weight:700;color:var(--ink2);transition:all .13s;min-width:52px;min-height:36px;text-align:center}
.ctx-btn.yes{border-color:var(--ok);background:var(--ok-bg);color:var(--ok)}
.ctx-btn.no{border-color:var(--ink4);background:var(--surface2);color:var(--ink3)}
.start-btn{width:100%;padding:16px;background:var(--brand);color:#fff;border-radius:var(--r12);font-family:'Sora',sans-serif;font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;border:none;box-shadow:var(--sh-brand)}
.start-btn:hover{background:var(--brand-dark);transform:translateY(-2px)}
.prog-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r12);box-shadow:var(--sh1);padding:16px;margin:12px 16px 0}
.prog-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.prog-lbl{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px}
.prog-pct{font-family:'Sora',sans-serif;font-size:22px;font-weight:900;color:var(--brand)}
.prog-track{background:var(--line2);border-radius:var(--r99);height:6px;overflow:hidden;margin-bottom:14px}
.prog-fill{height:100%;border-radius:var(--r99);background:var(--brand);transition:width .4s ease}
.prog-stats{display:grid;grid-template-columns:repeat(4,1fr);text-align:center;gap:4px}
.pv{font-family:'Sora',sans-serif;font-size:20px;font-weight:900;line-height:1}
.pl{font-size:9px;color:var(--ink3);font-weight:600;margin-top:3px;text-transform:uppercase;letter-spacing:.3px}
.status-panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r12);box-shadow:var(--sh1);padding:12px 16px;margin:10px 16px 0;display:flex;align-items:center;justify-content:space-between;gap:10px}
.s-badge{border-radius:var(--r99);padding:4px 12px;font-size:11px;font-weight:700;white-space:nowrap}
.s-ok{background:var(--ok-bg);color:var(--ok)}.s-warn{background:var(--warn-bg);color:var(--warn)}.s-err{background:var(--danger-bg);color:var(--danger)}
.sv{font-family:'Sora',sans-serif;font-size:17px;font-weight:900;line-height:1}
.sl{font-size:9px;color:var(--ink3);text-transform:uppercase;margin-top:2px;font-weight:600}
.section{margin:8px 16px 0;border-radius:var(--r12);overflow:hidden;border:1px solid var(--line);box-shadow:var(--sh0)}
.sec-head{padding:14px 16px;background:var(--surface);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .12s;min-height:52px}
.sec-head:hover{background:var(--surface2)}
.sec-head.has-err{background:var(--danger-bg);border-left:4px solid var(--brand)}
.sec-hl{display:flex;align-items:center;gap:10px}
.sec-icon{font-size:17px;width:24px;text-align:center;flex-shrink:0}
.sec-name{font-family:'Sora',sans-serif;font-size:13px;font-weight:800;color:var(--ink)}
.sec-meta{font-size:11px;color:var(--ink3);margin-top:2px}
.sec-right{display:flex;align-items:center;gap:8px}
.sec-badge{border-radius:var(--r99);padding:3px 10px;font-size:10px;font-weight:700}
.sb-d{background:var(--line2);color:var(--ink2)}.sb-ok{background:var(--ok-bg);color:var(--ok)}.sb-err{background:var(--danger-bg);color:var(--danger)}
.sec-chev{font-size:12px;color:var(--ink3);transition:transform .2s;display:inline-block}
.sec-chev.open{transform:rotate(180deg)}
.chk-item{padding:14px 16px;border-top:1px solid var(--line2);background:var(--surface)}
.chk-item:first-child{border-top:none}
.chk-item.lc{border-left:3px solid var(--brand)}.chk-item.li{border-left:3px solid var(--warn)}.chk-item.lr{border-left:3px solid var(--info-line)}
.lvl{display:inline-flex;align-items:center;font-size:9px;font-weight:800;border-radius:var(--r4);padding:2px 7px;margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px}
.lv-c{background:var(--danger-bg);color:var(--danger)}.lv-i{background:var(--warn-bg);color:var(--warn)}.lv-r{background:var(--info-bg);color:var(--info)}
.chk-title{font-size:14px;font-weight:600;color:var(--ink);line-height:1.5;margin-bottom:4px}
.chk-desc{font-size:12px;color:var(--ink2);line-height:1.6;margin-bottom:12px}
.ans-row{display:flex;gap:8px}
.ans-sim,.ans-nao{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:12px 14px;border-radius:var(--r8);border:1.5px solid var(--line);background:var(--surface2);font-size:14px;font-weight:700;color:var(--ink2);transition:all .13s;cursor:pointer;min-height:48px}
.ans-sim:hover{border-color:var(--ok-line);background:var(--ok-bg);color:var(--ok)}
.ans-nao:hover{border-color:var(--danger-line);background:var(--danger-bg);color:var(--danger)}
.ans-sim.sel{border-color:var(--ok);background:var(--ok);color:#fff}
.ans-nao.sel{border-color:var(--brand);background:var(--brand);color:#fff;box-shadow:var(--sh-brand)}
.req-msg{font-size:11px;color:var(--danger);margin-top:6px;font-weight:600;display:flex;align-items:center;gap:4px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:7px 14px;border-radius:var(--r99);border:1.5px solid var(--line);background:var(--surface);font-size:12px;font-weight:600;color:var(--ink2);cursor:pointer;transition:all .12s;white-space:nowrap;min-height:36px;display:inline-flex;align-items:center}
.chip:hover{border-color:var(--ink3);background:var(--surface2)}
.chip.sc{border-color:var(--brand);background:var(--brand);color:#fff;box-shadow:var(--sh-brand)}
.chip.sr{border-color:var(--info);background:var(--info);color:#fff}
.ger-neg-wrap{background:#FFF8F8;border:1.5px solid var(--danger-line);border-radius:var(--r12);padding:16px;margin-top:12px}
.ger-neg-title{font-family:'Sora',sans-serif;font-size:11px;font-weight:800;color:var(--danger);margin-bottom:14px}
.ger-field{margin-bottom:12px}
.ger-field-label{font-size:10px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.ger-input,.neg-obs{width:100%;border:1.5px solid var(--line);border-radius:var(--r8);padding:10px 12px;font-size:14px;color:var(--ink);background:var(--surface);transition:border-color .15s;resize:none;min-height:52px;line-height:1.5}
.ger-input:focus,.neg-obs:focus{border-color:var(--brand);outline:none;box-shadow:0 0 0 3px rgba(234,29,44,.08)}
.ger-input.err-field,.neg-obs.err-field{border-color:var(--danger);background:#FFF5F5}
.val-wrap{background:var(--danger-bg);border:1px solid var(--danger-line);border-radius:var(--r12);padding:14px 16px;margin:10px 16px 0}
.val-title{font-family:'Sora',sans-serif;font-size:12px;font-weight:800;color:var(--danger);margin-bottom:10px}
.val-item{font-size:12px;color:#B91C1C;padding:5px 0;border-bottom:1px solid var(--danger-line);display:flex;gap:7px;align-items:flex-start;line-height:1.5}
.val-item:last-child{border-bottom:none}
.val-item::before{content:'·';font-size:18px;line-height:.8;color:var(--danger);flex-shrink:0}
.fab{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--surface);border-top:1px solid var(--line);padding:10px 12px calc(10px + env(safe-area-inset-bottom,0px));display:flex;gap:8px;box-shadow:0 -2px 12px rgba(0,0,0,.08);min-height:var(--fab-h)}
.fab-inner{width:100%;max-width:var(--content-max);margin:0 auto;display:flex;gap:6px;align-items:center}
.fab-save{flex:0 0 auto;padding:11px 12px;border-radius:var(--r8);background:var(--surface2);border:1.5px solid var(--line);font-family:'Sora',sans-serif;font-size:11px;font-weight:700;color:var(--ink2);transition:all .13s;min-height:44px;white-space:nowrap}
.fab-send{flex:1;padding:12px 8px;border-radius:var(--r8);background:var(--brand);color:#fff;font-family:'Sora',sans-serif;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;box-shadow:var(--sh-brand);min-height:44px;white-space:nowrap}
.fab-send:hover{background:var(--brand-dark)}
.fab-send:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.fab-del{flex:0 0 auto;padding:11px 14px;border-radius:var(--r8);background:var(--surface2);border:1.5px solid var(--line);font-size:17px;min-height:44px;transition:all .13s}
.fab-del:hover{background:var(--danger-bg);border-color:var(--danger-line)}
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:9px 20px;border-radius:var(--r99);font-size:12px;font-weight:600;z-index:9999;box-shadow:var(--sh3);opacity:0;transition:opacity .22s;pointer-events:none;white-space:nowrap;max-width:90vw}
.toast.on{opacity:1}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:800;display:flex;align-items:center;justify-content:center;padding:20px}
.overlay-card{background:var(--surface);border-radius:var(--r16);padding:28px 24px;width:100%;max-width:280px;text-align:center;box-shadow:var(--sh3)}
.spin{width:36px;height:36px;border:3px solid var(--line2);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.ceo-hdr{background:linear-gradient(135deg,#1A1A1A 0%,#2D0008 50%,#EA1D2C 100%);color:#fff;padding:20px 16px 16px}
.ceo-title{font-family:'Sora',sans-serif;font-size:20px;font-weight:900;letter-spacing:-.3px}
.ceo-sub{font-size:10px;opacity:.55;margin-top:2px;letter-spacing:.3px}
.ceo-badge{display:inline-block;background:rgba(255,255,255,.12);border-radius:var(--r99);padding:3px 11px;font-size:9px;font-weight:700;margin-top:7px;letter-spacing:.3px}
.ceo-nav{display:flex;gap:6px;padding:12px 16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.ceo-nav::-webkit-scrollbar{display:none}
.nav-tab{padding:7px 14px;border-radius:var(--r99);font-family:'Sora',sans-serif;font-size:11px;font-weight:700;white-space:nowrap;border:1.5px solid var(--line);background:var(--surface);color:var(--ink2);flex-shrink:0;transition:all .13s;min-height:34px}
.nav-tab:hover{border-color:var(--ink3);background:var(--surface2)}
.nav-tab.active{background:var(--brand);border-color:var(--brand);color:#fff}
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px 16px}
.kpi-card{background:var(--surface);border-radius:var(--r12);border:1px solid var(--line);box-shadow:var(--sh1);padding:14px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kc-r::before{background:var(--brand)}.kc-g::before{background:var(--ok)}.kc-o::before{background:var(--warn)}.kc-b::before{background:var(--info)}.kc-t::before{background:#0891B2}
.kpi-lbl{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.kpi-val{font-family:'Sora',sans-serif;font-size:26px;font-weight:900;line-height:1}
.kpi-sub{font-size:10px;color:var(--ink2);margin-top:3px}
.kpi-ico{position:absolute;right:12px;top:12px;font-size:20px;opacity:.12}
.chart-card{background:var(--surface);border-radius:var(--r12);border:1px solid var(--line);box-shadow:var(--sh1);padding:16px;margin:0 16px 12px}
.chart-t{font-family:'Sora',sans-serif;font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;color:var(--ink)}
.rank-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.rank-row:last-child{border-bottom:none}
.rank-pos{font-family:'Sora',sans-serif;font-size:15px;font-weight:900;width:24px;text-align:center}
.rank-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
.rank-name{font-family:'Sora',sans-serif;font-size:14px;font-weight:700}
.rank-sub{font-size:11px;color:var(--ink2);margin-top:2px}
.rank-score{font-family:'Sora',sans-serif;font-size:18px;font-weight:900}
.alert-row{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
.alert-row:last-child{border-bottom:none}
.a-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}

async function sbInsert(table,data){

async function sbSelect(table,filters){
  try{
    let q=sb.from(table).select('*').order('created_at',{ascending:false});
    if(filters){Object.entries(filters).forEach(function([k,v]){q=q.eq(k,v);});}
    const{data,error}=await q;
    if(error){console.error('SB select error:',error);return[];}

  }catch(e){console.error('SB error:',e);return[];}
}

function detectarCategoriaDP(texto){
  var t=(texto||'').toLowerCase();
  if(t.indexOf('ifood')>=0||t.indexOf('ponto mais')>=0||t.indexOf('cartão bom')>=0||t.indexOf('benefício')>=0||t.indexOf('sistema')>=0||t.indexOf('acesso')>=0||t.indexOf('app')>=0)return'sistema';
  if(t.indexOf('document')>=0||t.indexOf('arquivo')>=0||t.indexOf('assinat')>=0||t.indexOf('prazo')>=0||t.indexOf('lançado')>=0)return'documentacao';
  if(t.indexOf('colabor')>=0||t.indexOf('solicit')>=0||t.indexOf('dúvida')>=0||t.indexOf('demanda')>=0||t.indexOf('comunicação')>=0)return'equipe';
  if(t.indexOf('fechamento')>=0||t.indexOf('próximo')>=0||t.indexOf('continuid')>=0||t.indexOf('pendência')>=0)return'fechamento';
  return'default';
}

function validateDPNeg(neg){
  var n=neg||{};
  var isEscalei=n.acao==='escalei';var isPendente=n.acao==='pendente';
  var isOutro=n.ocorrencia==='Outro'||n.ocorrencia==='Outro sistema';
  var precisaDetalhe=isOutro||isPendente||isEscalei;
  if(!n.ocorrencia||!n.acao||!n.prox)return false;
  if(isEscalei&&!n.escaladoPara)return false;
  if(precisaDetalhe&&!n.detalhe)return false;
  return true;
}

function DPChecklistScreen(props){
  var user=props.user;var onLogout=props.onLogout;var onBack=props.onBack;
  var DP_SAVE_KEY='checkon_dp_'+user.login;
  var _sc=useState('freq');var screen=_sc[0];var setScreen=_sc[1];
  var _freq=useState('diario');var freq=_freq[0];var setFreq=_freq[1];
  var _rs=useState({});var resps=_rs[0];var setResps=_rs[1];
  var _ng=useState({});var negs=_ng[0];var setNegs=_ng[1];
  var _se=useState(false);var showErr=_se[0];var setShowErr=_se[1];
  var _ve=useState([]);var valErrs=_ve[0];var setValErrs=_ve[1];
  var _sn=useState(false);var sending=_sn[0];var setSending=_sn[1];
  var _toast=useToast();var toast=_toast[0];var showToast=_toast[1];
  var _inicio=useState(null);var horaInicio=_inicio[0];var setHoraInicio=_inicio[1];
  var _sug=useState({});var sugestao=_sug[0];var setSugestao=_sug[1];
  var _sugOpen=useState(false);var sugestaoAberta=_sugOpen[0];var setSugestaoAberta=_sugOpen[1];
  var _tempoTotal=useState('');var tempoTotal=_tempoTotal[0];var setTempoTotal=_tempoTotal[1];
  var _enviado=useState(false);var enviado=_enviado[0];var setEnviado=_enviado[1];
  var _enviadoScore=useState(0);var enviadoScore=_enviadoScore[0];var setEnviadoScore=_enviadoScore[1];
  var _dpCtx=useState({admissao:'',assinatura:'',comunicado:'',uniforme:'',exame:'',ocorrencia:'',colaborador_trouxe:''});var dpCtx=_dpCtx[0];var setDpCtx=_dpCtx[1];
  var freqCfg=DP_FREQ_MAP[freq]||DP_FREQ_MAP.diario;
  var blocos=freqCfg.blocos;
    var allItems=useMemo(function(){var raw=blocos.reduce(function(acc,b){return acc.concat(b.itens);},[]);return raw.filter(function(it){if(it.cond==='admissao'&&dpCtx.admissao!=='sim')return false;if(it.cond==='assinatura'&&dpCtx.assinatura!=='sim')return false;if(it.cond==='comunicado'&&dpCtx.comunicado!=='sim')return false;if(it.cond==='uniforme'&&dpCtx.uniforme!=='sim')return false;if(it.cond==='exame'&&dpCtx.exame!=='sim')return false;if(it.cond==='colaborador_trouxe'&&dpCtx.colaborador_trouxe!=='sim')return false;return true;});},[freq,dpCtx]);

  useEffect(function(){
    try{var s=JSON.parse(localStorage.getItem(DP_SAVE_KEY));if(s&&s.resps){setFreq(s.freq||'diario');setResps(s.resps||{});setNegs(s.negs||{});setHoraInicio(s.horaInicio||null);/* tela sempre começa em freq — banner de rascunho avisa o usuario */}}catch(e){}
  },[]);
  useEffect(function(){
    if(screen==='checklist'){try{localStorage.setItem(DP_SAVE_KEY,JSON.stringify({freq:freq,resps:resps,negs:negs,horaInicio:horaInicio}));}catch(e){}}
  },[resps,negs,screen,freq]);

  function onAns(id,val){setResps(function(r){return Object.assign({},r,{[id]:val});});if(val==='sim'){setNegs(function(n){var c=Object.assign({},n);delete c[id];return c;});}}
  function onNeg(id,updater){setNegs(function(n){var current=n[id]||{};var next=typeof updater==='function'?updater(current):updater;return Object.assign({},n,{[id]:next});});}
  function calcTempo(inicio){if(!inicio)return '';try{var parts=inicio.split(':');var now=new Date();var then=new Date();then.setHours(parseInt(parts[0]),parseInt(parts[1]),0,0);var diff=Math.round((now-then)/60000);if(diff<0||diff>480)return '';var h=Math.floor(diff/60);var m=diff%60;return h>0?h+'h '+(m>0?m+'min':''):(m+'min');}catch(e){return '';}}
  function validate(){var errs=[];allItems.forEach(function(item){if(!resps[item.id]){errs.push('"'+item.texto+'" — sem resposta');return;}if(resps[item.id]==='nao'&&!validateDPNeg(negs[item.id])){errs.push('"'+item.texto+'" — complete o registro');}});return errs;}
  var stats=useMemo(function(){var tot=allItems.length;var resp=allItems.filter(function(i){return resps[i.id];}).length;var fl=allItems.filter(function(i){return resps[i.id]==='nao';}).length;return{tot:tot,resp:resp,fl:fl,pend:tot-resp,pct:tot>0?Math.round(resp/tot*100):0};},[resps,freq]);

  async function handleEnviar(){
    var errs=validate();setValErrs(errs);
    if(errs.length>0){setShowErr(true);window.scrollTo({top:0,behavior:'smooth'});showToast('⚠ Corrija os campos obrigatórios');return;}
    setSending(true);
    var tempo=calcTempo(horaInicio);setTempoTotal(tempo);
    var total=allItems.length;
    var falhas=allItems.filter(function(i){return resps[i.id]==='nao';}).length;
    var statusGeral=falhas===0?'ok':falhas<=2?'atencao':'critico';

  var _o=useState(true);var open=_o[0];var setOpen=_o[1];
  var items=etapa.itens||[];var tot=items.length;
  var resp=items.filter(function(i){return resps[i.id];}).length;
  var fl=items.filter(function(i){return resps[i.id]==='nao';}).length;
  var allDone=resp===tot&&tot>0;
  var hasErr=showErr&&items.some(function(i){if(!resps[i.id])return true;if(resps[i.id]==='nao'){return !validateSubgerNeg(negs[i.id]);}return false;});
  return(
    <div className="section">
      <div className={'sec-head'+(hasErr?' has-err':'')} onClick={function(){setOpen(function(o){return !o;});}}>
        <div className="sec-hl"><span className="sec-icon">{etapa.emoji}</span><div><div className="sec-name">{etapa.titulo}</div><div className="sec-meta">{etapa.horario&&<span style={{color:'var(--brand)',fontWeight:700}}>{etapa.horario} · </span>}{resp}/{tot} respondidos{fl>0?' · '+fl+' NÃO':''}</div></div></div>
        <div className="sec-right"><span className={'sec-badge'+(allDone?' sb-ok':hasErr?' sb-err':' sb-d')}>{resp}/{tot}</span><span className={'sec-chev'+(open?' open':'')}>▾</span></div>
      </div>
      {open&&<div style={{background:'#FAFAFA'}}>{items.map(function(item){return<SubgerBlocoItem key={item.id} item={item} resp={resps[item.id]} neg={negs[item.id]} onAns={onAns} onNeg={onNeg} showErr={showErr}/>;})}</div>}
    </div>
  );
}

function SubgerSummaryScreen(props){
  var resps=props.resps;var negs=props.negs;var user=props.user;var horaInicio=props.horaInicio;var onNovo=props.onNovo;
  var _copied=useState(false);var copied=_copied[0];var setCopied=_copied[1];
  var _conf=useState(false);var confirmando=_conf[0];var setConfirmando=_conf[1];
  var _enc=useState(false);var encerrado=_enc[0];var setEncerrado=_enc[1];
  var allItems=SUBGER_ETAPAS.reduce(function(acc,e){return acc.concat(e.itens);},[]);
  var total=allItems.length;
  var falhasItems=allItems.filter(function(i){return resps[i.id]==='nao';});
  var falhas=falhasItems.length;
  var criticos=allItems.filter(function(i){return i.critico&&resps[i.id]==='nao';}).length;
  var pendencias=falhasItems.filter(function(i){var n=negs[i.id]||{};return n.prox==='Sim, fica pendente';}).length;
  var etapasConcluidas=SUBGER_ETAPAS.filter(function(e){return e.itens.every(function(i){return resps[i.id];});}).length;
  var status=criticos>0?'Crítico':falhas>0?'Atenção':'Operação controlada';
  var statusCor=criticos>0?'var(--danger)':falhas>0?'var(--warn)':'var(--ok)';
  var statusBg=criticos>0?'var(--danger-bg)':falhas>0?'var(--warn-bg)':'var(--ok-bg)';
  var statusEmoji=criticos>0?'🚨':falhas>0?'⚠️':'✅';
  var score=Math.max(0,Math.round(100-(falhas/total*50)-(criticos*8)));
  function calcTempo(){if(!horaInicio)return '';try{var parts=horaInicio.split(':');var now=new Date();var then=new Date();then.setHours(parseInt(parts[0]),parseInt(parts[1]),0,0);var diff=Math.round((now-then)/60000);if(diff<0||diff>600)return '';var h=Math.floor(diff/60);var m=diff%60;return h>0?h+'h '+(m>0?m+'min':''):(m+'min');}catch(e){return '';}}
  var tempo=calcTempo();

  function buildTextGrupo(){
    var linhas=[];
    var pendentes=[];var resolvidosNaHora=0;var escalados=[];
    falhasItems.forEach(function(it){
      var n=negs[it.id]||{};
      if(n.feito==='Resolvi na hora'||n.feito==='Corrigi parcialmente')resolvidosNaHora++;
      else if(n.feito==='Acionei gerência'||n.feito==='Acionei direção')escalados.push({item:it.texto,motivo:n.aconteceu||''});
      else if(n.prox==='Sim, fica pendente')pendentes.push({item:it.texto,motivo:n.aconteceu||''});
    });
    linhas.push('🌅 Subgerência Manhã · '+todayFmt());linhas.push('');
    if(falhas===0){
      linhas.push(user.name+' fechou o turno da manhã. Tudo em ordem,');
      linhas.push(total+' de '+total+' itens. Score '+score+'.');
      linhas.push('');linhas.push('Nada pra reportar. ✅');
    }else{
      linhas.push(user.name+' fechou. Score '+score+', '+falhas+' item'+(falhas>1?'s':'')+' com ocorrência.');
      if(tempo)linhas.push('⏱ Duração: '+tempo+'.');linhas.push('');
      if(escalados.length>0){linhas.push('Precisa de atenção:');escalados.forEach(function(e){linhas.push('→ '+e.item+(e.motivo?' — '+e.motivo:'')+'.');});}
      if(pendentes.length>0){linhas.push('');linhas.push('Ficou pendente:');pendentes.forEach(function(e){linhas.push('→ '+e.item+'.');});}
      if(resolvidosNaHora>0){linhas.push('');linhas.push(resolvidosNaHora+' resolvido'+(resolvidosNaHora>1?'s':'')+' na hora.');}
      linhas.push('');linhas.push('Registrado no CheckON.');
    }
    linhas.push('');linhas.push('— CheckON · Pastel da Camilla');
    return linhas.join('\n');
  }

  function buildTextCopy(){
    var txt=[SISTEMA+' — Subgerência Manhã','━━━━━━━━━━',user.name+' · '+todayFmt()+(tempo?' · ⏱ '+tempo:''),'Status: '+status+' · Score: '+score+'/100'];
    txt.push('━━━━━━━━━━','✅ OK: '+(total-falhas)+'/'+total+'  ❌ Falhas: '+falhas+(pendencias>0?'  ⏳ Pendências: '+pendencias:''));
    if(falhas>0){txt.push('','🔴 Ocorrências:');falhasItems.forEach(function(it,i){var n=negs[it.id]||{};txt.push((i+1)+'. '+it.texto);if(n.aconteceu)txt.push('   O que: '+n.aconteceu);if(n.feito)txt.push('   Ação: '+n.feito);if(n.prox==='Sim, fica pendente')txt.push('   ⚠️ Pendente para o próximo turno');});}
    txt.push('━━━━━━━━━━','_CheckON · Pastel da Camilla_');
    return txt.join('\n');
  }

  function handleCopy(){
    var s=buildTextCopy();
    if(navigator.clipboard){navigator.clipboard.writeText(s).catch(function(){var ta=document.createElement('textarea');ta.value=s;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);});}
    else{var ta=document.createElement('textarea');ta.value=s;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
  }

  function handleEnviarGrupo(){
    var txt=buildTextGrupo();
    try{if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(txt).catch(function(){});}else{var ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');}catch(ex){}document.body.removeChild(ta);}}catch(ex){}
    setCopied(true);
  }

  if(encerrado){return<TurnoEncerrado user={user} falhas={falhas} criticos={criticos} score={score} turnoLabel={'🌅 Subgerência Manhã'} cor="var(--brand)" onHub={onNovo} onBack={props.onBack} onLogout={props.onLogout} onRevisar={function(){setEncerrado(false);}}/>;}
  if(confirmando){
    return(
      <div style={{minHeight:'100vh',background:'var(--bg)',paddingBottom:32}}>
        <div style={{background:'var(--brand)',color:'#fff',padding:'14px 16px'}}>
          <button onClick={function(){setConfirmando(false);}} style={{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.3)',color:'#fff',borderRadius:99,padding:'5px 12px',fontSize:11,fontWeight:600,cursor:'pointer',marginBottom:10}}>← Voltar</button>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:28}}>📲</span>
            <div><div style={{fontFamily:"'Sora',sans-serif",fontSize:16,fontWeight:900}}>Enviar para o grupo</div><div style={{fontSize:12,opacity:.75,marginTop:1}}>{falhas===0?'Turno impecável!':'Relatório com ocorrências.'}</div></div>
          </div>
        </div>
        <div style={{maxWidth:720,margin:'0 auto',padding:'16px 16px 0'}}>
          <div style={{background:'#fff',borderRadius:'var(--r12)',border:'1px solid var(--line)',padding:'16px',marginBottom:16}}>
            <div style={{fontSize:13,color:'var(--ink)',lineHeight:1.7,marginBottom:14}}>{falhas===0?'Turno concluído com excelência! Clique para avisar o grupo.':'Clique abaixo — o texto é copiado e o WhatsApp abre. Cole e envie!'}</div>
            {!copied&&(<div style={{display:'flex',flexDirection:'column',gap:8}}>{[{n:'1',txt:'Toque no botão verde abaixo'},{n:'2',txt:'O WhatsApp vai abrir'},{n:'3',txt:'Segure a caixa de texto e toque em Colar'}].map(function(step){return(<div key={step.n} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 12px',background:'#F8FAFC',borderRadius:'var(--r8)',border:'1px solid var(--line)'}}><div style={{width:26,height:26,borderRadius:'50%',background:'var(--brand)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:800,flexShrink:0}}>{step.n}</div><div style={{fontSize:13,color:'var(--ink)',fontWeight:500}}>{step.txt}</div></div>);})}  </div>)}
            {copied&&(<div style={{background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:'var(--r8)',padding:'12px 14px',display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:22}}>✅</span><div><div style={{fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:700,color:'var(--ok)'}}>Texto copiado!</div><div style={{fontSize:12,color:'#166534',marginTop:2}}>WhatsApp aberto — cole e envie!</div></div></div>)}
          </div>
          <a href={WA_GROUP} target="_blank" rel="noopener noreferrer" onClick={handleEnviarGrupo} style={{width:'100%',padding:16,background:copied?'var(--ok)':'#25D366',color:'#fff',borderRadius:'var(--r12)',fontFamily:"'Sora',sans-serif",fontSize:16,fontWeight:800,cursor:'pointer',border:'none',marginBottom:10,display:'flex',alignItems:'center',justifyContent:'center',gap:10,textDecoration:'none',boxSizing:'border-box'}}>
            <span style={{fontSize:22}}>📲</span>{copied?'Enviado ✓':'Abrir WhatsApp'}
          </a>
          {copied&&<button onClick={function(){setEncerrado(true);}} style={{width:'100%',padding:15,background:'var(--brand)',color:'#fff',borderRadius:'var(--r12)',fontFamily:"'Sora',sans-serif",fontSize:15,fontWeight:800,cursor:'pointer',border:'none',marginBottom:10}}>✓ Terminei meu turno</button>}
          <div style={{display:'flex',gap:8}}>
            <button onClick={function(){setConfirmando(false);}} style={{flex:1,padding:11,background:'transparent',color:'var(--ink3)',borderRadius:'var(--r12)',fontSize:12,fontWeight:600,cursor:'pointer',border:'1px solid var(--line)'}}>← Voltar</button>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:'100vh',background:'#F4F4F6',paddingBottom:32}}>
      <div style={{background:'var(--brand)',color:'#fff',padding:'14px 16px'}}>
        <div style={{fontSize:10,fontWeight:700,opacity:.6,textTransform:'uppercase',letterSpacing:1.5,marginBottom:4}}>CheckON · Subgerência</div>
        <div style={{fontFamily:"'Sora',sans-serif",fontSize:18,fontWeight:900}}>Turno da Manhã — Concluído ✓</div>

            {falhasItems.map(function(item){var n=negs[item.id]||{};return(<div key={item.id} style={{padding:'9px 0',borderBottom:'1px solid #F3F4F6'}}><div style={{fontSize:13,fontWeight:600,color:'var(--ink)',lineHeight:1.4,marginBottom:4}}>{item.texto}</div><div style={{fontSize:11,color:'#991B1B',lineHeight:1.6}}>{n.aconteceu&&<div>O que: {n.aconteceu}</div>}{n.feito&&<div>Ação: {n.feito}</div>}{n.prox&&<div style={{fontWeight:600,marginTop:2}}>{n.prox==='Sim, fica pendente'?'⚠️ Pendente':'✅ Encerrado'}</div>}{n.detalhe&&<div style={{color:'var(--ink2)',marginTop:2}}>{n.detalhe}</div>}</div></div>);})}

function getCacheKey(login){return 'checkon_ctx_'+login;}

/* Verifica se já há registro enviado hoje para este usuário/tabela */
async function verificarTurnoHoje(user, tabela){
  try{
    var hoje=todayISO();
    var q=sb.from(tabela).select('*').eq('login',user.login).order('created_at',{ascending:false}).limit(3);
    var res=await q;
    if(res.error||!res.data||res.data.length===0)return null;
    return res.data.find(function(r){return r.data===hoje;})||null;
  }catch(e){return null;}
}

/* Busca pendências da manhã (subger_checklists) para a Vitória */
async function buscarPendenciasManhaParaNoite(){
  try{
    var hoje=todayISO();
    /* Busca só registros de hoje da manhã — com filtro de data no client sobre resultado limitado */
    var q=sb.from('subger_checklists').select('*').eq('data',hoje).order('created_at',{ascending:false}).limit(5);
    var res=await q;
    if(res.error||!res.data||res.data.length===0)return null;
    var turnoHoje=res.data[0];
    var negs=turnoHoje.negs||{};
    var resps=turnoHoje.resps||{};
    var pendentes=Object.keys(resps).filter(function(id){
      return resps[id]==='nao'&&negs[id]&&(negs[id].prox==='Sim, fica pendente'||negs[id].prox==='Sim');
    });
    return{
      responsavel:turnoHoje.user_name||'Manhã',
      score:turnoHoje.score||0,
      pendencias:pendentes.length,
      horario:turnoHoje.hora||'',
    };
  }catch(e){return null;}
}

async function analisarHistorico(user, tabela, itensCriticos){
  var CACHE_KEY=getCacheKey(user.login);
  var hoje=todayISO();
  
  // Tenta cache local primeiro (válido por 4h)
  try{
    var cached=JSON.parse(localStorage.getItem(CACHE_KEY));
    if(cached&&cached.tabela===tabela&&cached.data===hoje&&cached.hora){
      var diff=(new Date()-new Date(hoje+'T'+cached.hora))/3600000;
      if(diff<4)return cached.resultado;
    }
  }catch(e){}

  // Busca Supabase
  var resultado={
    scoresMedio:0,
    streak:0,
    falhasFrequentes:[],
    alertas:[],
    ultimoTurno:null,
    totalRegistros:0,
  };

  try{
    var rows=await sbSelect(tabela,{login:user.login});
    if(!rows||rows.length===0){
      // Salva cache vazio
      try{localStorage.setItem(CACHE_KEY,JSON.stringify({tabela,data:hoje,hora:nowTime(),resultado}));}catch(e){}
      return resultado;
    }

    resultado.totalRegistros=rows.length;
    resultado.ultimoTurno=rows[0];

    // Score médio últimos 7
    var ultimos7=rows.slice(0,7);
    var scores=ultimos7.map(function(r){return r.score||0;});
    resultado.scoresMedio=Math.round(scores.reduce(function(a,b){return a+b;},0)/scores.length);

    // Streak sem crítico
    var streak=0;
    for(var i=0;i<rows.length;i++){
      if((rows[i].criticos||0)===0)streak++;
      else break;
    }
    resultado.streak=streak;

    // Falhas frequentes: contar quais ids aparecem como 'nao' nos últimos 5 turnos
    var falhaCount={};
    rows.slice(0,5).forEach(function(row){
      var rs=row.resps||{};
      Object.keys(rs).forEach(function(id){
        if(rs[id]==='nao'){
          falhaCount[id]=(falhaCount[id]||0)+1;
        }
      });
    });

    // Items que falharam 2+ vezes nos últimos 5
    var frequentes=Object.entries(falhaCount)
      .filter(function(e){return e[1]>=2;})
      .sort(function(a,b){return b[1]-a[1];})
      .slice(0,3);
    
    // Mapear ids para textos
    resultado.falhasFrequentes=frequentes.map(function(entry){
      var id=entry[0];var count=entry[1];
      var item=itensCriticos&&itensCriticos.find(function(it){return it.id===id;});
      return{id:id,texto:item?item.texto:id,vezes:count};
    });

    // Alertas baseados em padrão
    resultado.alertas=[];
    if(resultado.falhasFrequentes.length>0){
      resultado.falhasFrequentes.forEach(function(f){
        resultado.alertas.push({
          tipo:'falha_frequente',
          msg:'"'+f.texto+'" falhou '+f.vezes+'x nos últimos 5 turnos.',
          icone:'🔁'
        });
      });
    }
    if(resultado.streak>=5){
      resultado.alertas.push({tipo:'conquista',msg:resultado.streak+' turnos seguidos sem item crítico! 🔥',icone:'🏆'});
    }
    if(resultado.scoresMedio<70&&resultado.totalRegistros>=3){
      resultado.alertas.push({tipo:'atencao',msg:'Score médio abaixo de 70 nos últimos 7 turnos.',icone:'⚠️'});
    }

    // Salva cache
    try{localStorage.setItem(CACHE_KEY,JSON.stringify({tabela,data:hoje,hora:nowTime(),resultado}));}catch(e){}

  }catch(err){
    // Fallback: usa localStorage de registros locais se disponível
    try{
      var localKey='checkon_hist_'+user.login+'_'+tabela;
      var local=JSON.parse(localStorage.getItem(localKey)||'[]');
      if(local.length>0){
        resultado.totalRegistros=local.length;
        resultado.ultimoTurno=local[0];
        var sc=local.slice(0,7).map(function(r){return r.score||0;});
        resultado.scoresMedio=Math.round(sc.reduce(function(a,b){return a+b;},0)/sc.length);
      }
    }catch(e2){}
  }

  return resultado;
}

/* ── Etapa por etapa (paginação de blocos) ── */
function SubgerChecklistScreen(props){

  var SAVE_KEY=SUBGER_SAVE_KEY_PREFIX+user.login;
  var _sc=useState('inicio');var screen=_sc[0];var setScreen=_sc[1];
  var _etapaIdx=useState(0);var etapaIdx=_etapaIdx[0];var setEtapaIdx=_etapaIdx[1];
  var _resps=useState({});var resps=_resps[0];var setResps=_resps[1];
  var _negs=useState({});var negs=_negs[0];var setNegs=_negs[1];
  var _showErr=useState(false);var showErr=_showErr[0];var setShowErr=_showErr[1];
  var _sending=useState(false);var sending=_sending[0];var setSending=_sending[1];
  var _toast=useToast();var toast=_toast[0];var showToast=_toast[1];
  var _inicio=useState(null);var horaInicio=_inicio[0];var setHoraInicio=_inicio[1];

  var _enviado=useState(false);var enviado=_enviado[0];var setEnviado=_enviado[1];
  var _envScore=useState(0);var envScore=_envScore[0];var setEnvScore=_envScore[1];

  useEffect(function(){

      var s=JSON.parse(localStorage.getItem(SAVE_KEY));

        setResps(s.resps||{});setNegs(s.negs||{});setHoraInicio(s.horaInicio||null);
        if(s.sugestao)setSugestao(s.sugestao);

    }catch(e){}
  },[]);

  useEffect(function(){
    if(screen==='checklist'){
      try{localStorage.setItem(SAVE_KEY,JSON.stringify({resps:resps,negs:negs,horaInicio:horaInicio,sugestao:sugestao}));}catch(e){}
    }

  function onAns(id,val){

  var falhasTotal=allItems.filter(function(i){return resps[i.id]==='nao';}).length;
  var pct=totalItems>0?Math.round(respondidos/totalItems*100):0;

  var etapaAtual=SUBGER_ETAPAS[etapaIdx];

  function validateEtapa(idx){
    var etapa=SUBGER_ETAPAS[idx];
    var errs=[];
    etapa.itens.forEach(function(item){
      if(!resps[item.id]){errs.push(item.texto);return;}
      if(resps[item.id]==='nao'&&!validateSubgerNeg(negs[item.id])){errs.push(item.texto+' — complete o registro');}

  function handleAvancar(){

    setShowErr(false);
    if(etapaIdx<SUBGER_ETAPAS.length-1){
      setEtapaIdx(function(i){return i+1;});
      window.scrollTo({top:0,behavior:'smooth'});
    }else{
      setScreen('ocorrencias');
      window.scrollTo({top:0,behavior:'smooth'});
    }
  }

  function handleVoltar(){
    if(etapaIdx>0){setEtapaIdx(function(i){return i-1;});window.scrollTo({top:0,behavior:'smooth'});}
    else{setScreen('inicio');}
    setShowErr(false);
  }

  async function handleFinalizar(relato){
    setSending(true);
    var criticos=allItems.filter(function(i){return i.critico&&resps[i.id]==='nao';}).length;
    var falhas=allItems.filter(function(i){return resps[i.id]==='nao';}).length;
    var pendencias=allItems.filter(function(i){var n=negs[i.id]||{};return resps[i.id]==='nao'&&n.prox==='Sim, fica pendente';}).length;
    var statusKey=criticos>0?'critico':falhas>0?'atencao':'ok';
    var score=Math.max(0,Math.round(100-(falhas/totalItems*50)-(criticos*8)));
    var etapasConcluidas=SUBGER_ETAPAS.filter(function(e){return e.itens.every(function(i){return resps[i.id];});}).length;
    await sbInsert('subger_checklists',{login:user.login,user_name:user.name,turno:'manha',data:todayISO(),data_fmt:todayFmt(),hora:nowTime(),hora_inicio:horaInicio,score:score,total:totalItems,falhas:falhas,criticos:criticos,pendencias:pendencias,status:statusKey,etapas_concluidas:etapasConcluidas,resps:resps,negs:negs,relato:relato||'',sugestao:(sugestao&&sugestao.atividade?sugestao:{})});
    await salvarPendencias(allItems,negs,resps,user,'manha','subger_checklists');
    await sendWebhook(SISTEMA+' — SUBGERÊNCIA MANHÃ\n'+user.name+' · '+todayFmt()+'\nStatus: '+statusKey.toUpperCase()+' · Score: '+score+'/100',{assunto:'[CheckON Subgerência] '+statusKey.toUpperCase()+' – '+user.name});
    try{localStorage.removeItem(SAVE_KEY);}catch(e){}
    setEnvScore(score);setEnviado(true);
    setTimeout(function(){setSending(false);setEnviado(false);setScreen('summary');},2200);
  }

  function handleLimpar(){
    if(!window.confirm('Limpar checklist atual?'))return;
    try{localStorage.removeItem(SAVE_KEY);}catch(e){}
    setResps({});setNegs({});setShowErr(false);setEtapaIdx(0);setHoraInicio(null);setSugestao({});setSugestaoAberta(false);setScreen('inicio');
  }

  var subgerHdr=(
    <div style={{background:'var(--brand)',color:'#fff',height:52,padding:'0 16px',display:'flex',alignItems:'center',position:'sticky',top:0,zIndex:100}}>
      <div style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:9,opacity:.7,fontWeight:700,letterSpacing:2,textTransform:'uppercase'}}>CheckON · Subgerência</div>
          <div style={{fontFamily:"'Sora',sans-serif",fontSize:15,fontWeight:800}}>Turno da Manhã</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <div style={{background:'rgba(255,255,255,.15)',borderRadius:99,padding:'4px 11px',fontSize:11,fontWeight:600}}>👤 {user.name}</div>
          {onBack&&<button className="hdr-btn" onClick={function(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({resps:resps,negs:negs,horaInicio:horaInicio}));}catch(e){}onBack();}}>← Voltar</button>}
          <button className="hdr-btn" onClick={onLogout}>Sair</button>
        </div>
      </div>
    </div>
  );

  if(screen==='summary'){
    return<SubgerSummaryScreen resps={resps} negs={negs} user={user} horaInicio={horaInicio} onBack={onBack} onLogout={onLogout} onNovo={function(){setResps({});setNegs({});setShowErr(false);setEtapaIdx(0);setHoraInicio(null);setScreen('inicio');}}/>;
  }

  if(screen==='ocorrencias'){
    var falhasItems=allItems.filter(function(i){return resps[i.id]==='nao';});
    return(
      <div style={{minHeight:'100vh',background:'#F4F4F6',paddingBottom:24}}>
        {subgerHdr}
        <div style={{maxWidth:720,margin:'0 auto',padding:'16px'}}>
          <div style={{background:'#fff',borderRadius:12,border:'1px solid #E5E7EB',padding:'18px',marginBottom:12}}>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:15,fontWeight:900,marginBottom:4}}>{falhasItems.length===0?'🎉 Turno impecável!':'📋 Resumo final'}</div>
            <div style={{fontSize:13,color:'var(--ink2)',marginBottom:12}}>{respondidos} de {totalItems} itens respondidos · {falhasTotal} {falhasTotal===1?'falha':'falhas'}</div>
            {falhasItems.length>0&&(
              <div style={{marginBottom:12}}>
                <label style={{display:'block',fontSize:13,fontWeight:600,color:'var(--ink)',marginBottom:6}}>Observações finais do turno (opcional)</label>
                <SubgerRelatoField onFinalizar={handleFinalizar}/>
              </div>
            )}
            {falhasItems.length===0&&<button onClick={function(){handleFinalizar('');}} style={{width:'100%',padding:15,background:'var(--brand)',color:'#fff',borderRadius:12,fontFamily:"'Sora',sans-serif",fontSize:15,fontWeight:700,cursor:'pointer',border:'none'}}>🚀 Enviar relatório</button>}
          </div>
          <button onClick={function(){setScreen('checklist');setShowErr(false);}} style={{width:'100%',padding:11,background:'transparent',color:'var(--ink3)',borderRadius:12,fontSize:12,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB'}}>← Revisar checklist</button>
        </div>
      </div>
    );
  }

  /* ── Início ── (estado de entrada, imediatamente vai para checklist) */
  var rascunhoSalvo=(function(){try{var s=JSON.parse(localStorage.getItem(SAVE_KEY));return s&&s.resps&&Object.keys(s.resps).length>0?s:null;}catch(e){return null;}})();

  if(screen==='inicio'){
    /* Auto-avança para o checklist com a hora de início definida */
    if(!horaInicio)setHoraInicio(nowTime());
    setEtapaIdx(0);setShowErr(false);setScreen('checklist');
    return null;
  }


  /* ── Checklist por etapa ── */
  return(
    <div>
      <EnviadoPopup show={enviado} user={user} score={envScore} label='Subgerência Manhã'/>

/* ══════════════════════════════════════════════
   HISTÓRICO PESSOAL — compartilhado por todos
   ══════════════════════════════════════════════ */
function HistoricoPanel(props){
  var user=props.user;var tabela=props.tabela;var labelTurno=props.labelTurno||function(d){return d.turno||d.freq||'–';};
  var _data=useState([]);var data=_data[0];var setData=_data[1];

    async function load(){
      setLoading(true);
      var rows=await sbSelect(tabela,{login:user.login});
      setData(rows.slice(0,14));
      setLoading(false);
    }
    load();
  },[]);
  if(loading)return(<div style={{padding:'24px',textAlign:'center',color:'var(--ink3)',fontSize:13}}><div className="spin" style={{margin:'0 auto 10px'}}/> Carregando histórico...</div>);
  if(data.length===0)return(<div style={{padding:'24px',textAlign:'center',color:'var(--ink3)',fontSize:13,background:'#fff',borderRadius:'var(--r12)',border:'1px solid var(--line)',margin:'12px 16px 0'}}>Nenhum registro ainda. Complete seu primeiro turno!</div>);

  var streak=0;for(var i=0;i<data.length;i++){if((data[i].criticos||0)===0)streak++;else break;}
  var falhaMap={};data.forEach(function(d){var rs=d.resps||{};var ng=d.negs||{};Object.keys(rs).forEach(function(id){if(rs[id]==='nao'){var texto=(ng[id]&&ng[id].aconteceu)||id;falhaMap[texto]=(falhaMap[texto]||0)+1;}});});
  var topFalha=Object.entries(falhaMap).sort(function(a,b){return b[1]-a[1];})[0];
  var diff=penultimo?ultimo.falhas-penultimo.falhas:null;
  var statusCor=ultimo.status==='ok'||ultimo.status==='conforme'?'var(--ok)':ultimo.status==='atencao'||ultimo.status==='ressalvas'?'var(--warn)':'var(--danger)';
  return(
    <div style={{paddingBottom:16}}>
      <div style={{margin:'12px 16px 0',background:'linear-gradient(135deg,#1A0003,#EA1D2C)',borderRadius:'var(--r12)',padding:'16px',color:'#fff'}}>
        <div style={{fontSize:10,opacity:.7,fontWeight:700,textTransform:'uppercase',letterSpacing:1.5,marginBottom:8}}>Sua evolução</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:12}}>
          <div style={{textAlign:'center'}}><div style={{fontFamily:"'Sora',sans-serif",fontSize:26,fontWeight:900}}>{ultimo.score}</div><div style={{fontSize:10,opacity:.7}}>Último score</div></div>
          <div style={{textAlign:'center'}}><div style={{fontFamily:"'Sora',sans-serif",fontSize:26,fontWeight:900}}>{streak}</div><div style={{fontSize:10,opacity:.7}}>Sem crítico 🔥</div></div>
          <div style={{textAlign:'center'}}><div style={{fontFamily:"'Sora',sans-serif",fontSize:26,fontWeight:900}}>{data.length}</div><div style={{fontSize:10,opacity:.7}}>Registros</div></div>
        </div>
        {diff!==null&&<div style={{fontSize:12,opacity:.85,marginBottom:6}}>{diff<0?'📈 Você melhorou! '+Math.abs(diff)+' falha'+(Math.abs(diff)!==1?'s':'')+ ' a menos que antes.':diff===0?'➡️ Mesmo número de falhas que antes.':'📉 Mais '+diff+' falha'+(diff!==1?'s':'')+' que antes. Você consegue melhorar!'}</div>}
        {topFalha&&topFalha[1]>1&&<div style={{fontSize:11,opacity:.8,background:'rgba(255,255,255,.12)',borderRadius:'var(--r8)',padding:'7px 10px'}}>⚠️ Falha mais frequente: <strong>{topFalha[0]}</strong> ({topFalha[1]}x)</div>}
        {streak>=5&&<div style={{fontSize:11,opacity:.9,marginTop:8,background:'rgba(255,255,255,.15)',borderRadius:'var(--r8)',padding:'7px 10px'}}>🏆 {streak} turnos sem nenhum item crítico! Continue assim.</div>}
      </div>
      <div style={{margin:'10px 16px 0',background:'#fff',borderRadius:'var(--r12)',border:'1px solid var(--line)',overflow:'hidden'}}>

function NoiteSummaryScreen(props){
  var resps=props.resps;var negs=props.negs;var user=props.user;var horaInicio=props.horaInicio;var onNovo=props.onNovo;
  var _copied=useState(false);var copied=_copied[0];var setCopied=_copied[1];
  var _conf=useState(false);var confirmando=_conf[0];var setConfirmando=_conf[1];
  var _enc=useState(false);var encerrado=_enc[0];var setEncerrado=_enc[1];
  var allItems=NOITE_ETAPAS.reduce(function(acc,e){return acc.concat(e.itens);},[]);
  var total=allItems.length;var falhasItems=allItems.filter(function(i){return resps[i.id]==='nao';});
  var falhas=falhasItems.length;var criticos=allItems.filter(function(i){return i.critico&&resps[i.id]==='nao';}).length;
  var pendencias=falhasItems.filter(function(i){var n=negs[i.id]||{};return n.prox==='Sim, fica pendente';}).length;
  var status=criticos>0?'Crítico':falhas>0?'Atenção':'Turno fechado ✓';
  var statusCor=criticos>0?'var(--danger)':falhas>0?'var(--warn)':'var(--ok)';
  var statusBg=criticos>0?'var(--danger-bg)':falhas>0?'var(--warn-bg)':'var(--ok-bg)';
  var score=Math.max(0,Math.round(100-(falhas/total*50)-(criticos*8)));
  function calcTempo(){if(!horaInicio)return '';try{var parts=horaInicio.split(':');var now=new Date();var then=new Date();then.setHours(parseInt(parts[0]),parseInt(parts[1]),0,0);var diff=Math.round((now-then)/60000);if(diff<0||diff>600)return '';var h=Math.floor(diff/60);var m=diff%60;return h>0?h+'h '+(m>0?m+'min':''):(m+'min');}catch(e){return '';}}
  var tempo=calcTempo();

  function buildTextGrupo(){
    var linhas=[];
    var pendentes=[];var resolvidosNaHora=0;var escalados=[];
    falhasItems.forEach(function(it){
      var n=negs[it.id]||{};
      if(n.feito==='Resolvi na hora'||n.feito==='Corrigi parcialmente')resolvidosNaHora++;
      else if(n.feito==='Acionei gerência'||n.feito==='Acionei direção')escalados.push({item:it.texto,motivo:n.aconteceu||''});
      else if(n.prox==='Sim, fica pendente')pendentes.push({item:it.texto,motivo:n.aconteceu||''});
    });
    linhas.push('🌙 Subgerência Noite · '+todayFmt());linhas.push('');
    if(falhas===0){
      linhas.push(user.name+' fechou o turno da noite. Tudo em ordem,');
      linhas.push(total+' de '+total+' itens. Score '+score+'.');
      linhas.push('');linhas.push('Loja fechada corretamente. ✅');
    }else{
      linhas.push(user.name+' fechou. Score '+score+', '+falhas+' item'+(falhas>1?'s':'')+' com ocorrência.');
      if(tempo)linhas.push('⏱ Duração: '+tempo+'.');linhas.push('');
      if(escalados.length>0){linhas.push('Precisa de atenção:');escalados.forEach(function(e){linhas.push('→ '+e.item+(e.motivo?' — '+e.motivo:'')+'.');});}
      if(pendentes.length>0){linhas.push('');linhas.push('Fica para a manhã:');pendentes.forEach(function(e){linhas.push('→ '+e.item+'.');});}
      if(resolvidosNaHora>0){linhas.push('');linhas.push(resolvidosNaHora+' resolvido'+(resolvidosNaHora>1?'s':'')+' na hora.');}
      linhas.push('');linhas.push('Registrado no CheckON.');
    }
    linhas.push('');linhas.push('— CheckON · Pastel da Camilla');
    return linhas.join('\n');
  }

  function handleCopy(){
    var txt=[SISTEMA+' — Subgerência Noite','━━━━━━━━━━',user.name+' · '+todayFmt()+(tempo?' · ⏱ '+tempo:''),'Status: '+status+' · Score: '+score+'/100'];
    txt.push('━━━━━━━━━━','✅ OK: '+(total-falhas)+'/'+total+'  ❌ Falhas: '+falhas+(pendencias>0?'  ⏳ Pendências: '+pendencias:''));
    if(falhas>0){txt.push('','🔴 Ocorrências:');falhasItems.forEach(function(it,i){var n=negs[it.id]||{};txt.push((i+1)+'. '+it.texto);if(n.aconteceu)txt.push('   O que: '+n.aconteceu);if(n.feito)txt.push('   Ação: '+n.feito);if(n.prox==='Sim, fica pendente')txt.push('   ⚠️ Pendente para a manhã');});}
    txt.push('━━━━━━━━━━','_CheckON · Pastel da Camilla_');
    var s=txt.join('\n');

function NoiteChecklistScreen(props){
  var user=props.user;var onLogout=props.onLogout;var onBack=props.onBack;
  var SAVE_KEY=NOITE_SAVE_KEY_PREFIX+user.login;
  var _sc=useState('inicio');var screen=_sc[0];var setScreen=_sc[1];
  var _etapaIdx=useState(0);var etapaIdx=_etapaIdx[0];var setEtapaIdx=_etapaIdx[1];
  var _resps=useState({});var resps=_resps[0];var setResps=_resps[1];
  var _negs=useState({});var negs=_negs[0];var setNegs=_negs[1];
  var _showErr=useState(false);var showErr=_showErr[0];var setShowErr=_showErr[1];
  var _sending=useState(false);var sending=_sending[0];var setSending=_sending[1];
  var _toast=useToast();var toast=_toast[0];var showToast=_toast[1];
  var _inicio=useState(null);var horaInicio=_inicio[0];var setHoraInicio=_inicio[1];
  var _relato=useState('');var relato=_relato[0];var setRelato=_relato[1];
  var _sug=useState({});var sugestao=_sug[0];var setSugestao=_sug[1];
  var _sugOpen=useState(false);var sugestaoAberta=_sugOpen[0];var setSugestaoAberta=_sugOpen[1];
  var _enviado=useState(false);var enviado=_enviado[0];var setEnviado=_enviado[1];
  var _envScore=useState(0);var envScore=_envScore[0];var setEnvScore=_envScore[1];
  useEffect(function(){try{var s=JSON.parse(localStorage.getItem(SAVE_KEY));if(s&&s.resps&&Object.keys(s.resps).length>0){setResps(s.resps||{});setNegs(s.negs||{});setHoraInicio(s.horaInicio||null);if(s.sugestao)setSugestao(s.sugestao);}}catch(e){}},[]);
  useEffect(function(){if(screen==='checklist'){try{localStorage.setItem(SAVE_KEY,JSON.stringify({resps:resps,negs:negs,horaInicio:horaInicio,sugestao:sugestao}));}catch(e){}}},[resps,negs,screen,horaInicio,sugestao]);
  function onAns(id,val){setResps(function(r){return Object.assign({},r,{[id]:val});});if(val==='sim'){setNegs(function(n){var c=Object.assign({},n);delete c[id];return c;});}}
  function onNeg(id,updater){setNegs(function(n){var current=n[id]||{};var next=typeof updater==='function'?updater(current):updater;return Object.assign({},n,{[id]:next});});}
  var allItems=useMemo(function(){return NOITE_ETAPAS.reduce(function(acc,e){return acc.concat(e.itens);},[]);},[]);
  var totalItems=allItems.length;
  var respondidos=allItems.filter(function(i){return resps[i.id];}).length;
  var falhasTotal=allItems.filter(function(i){return resps[i.id]==='nao';}).length;
  var pct=totalItems>0?Math.round(respondidos/totalItems*100):0;
  var etapaAtual=NOITE_ETAPAS[etapaIdx];
  function validateEtapa(idx){var etapa=NOITE_ETAPAS[idx];var errs=[];etapa.itens.forEach(function(item){if(!resps[item.id]){errs.push(item.texto);return;}if(resps[item.id]==='nao'&&!validateNoiteNeg(negs[item.id])){errs.push(item.texto+' — complete o registro');}});return errs;}
  function handleAvancar(){var errs=validateEtapa(etapaIdx);if(errs.length>0){setShowErr(true);window.scrollTo({top:0,behavior:'smooth'});showToast('⚠ Preencha todos os itens');return;}setShowErr(false);if(etapaIdx<NOITE_ETAPAS.length-1){setEtapaIdx(function(i){return i+1;});window.scrollTo({top:0,behavior:'smooth'});}else{setScreen('resumo');window.scrollTo({top:0,behavior:'smooth'});}}
  function handleVoltar(){if(etapaIdx>0){setEtapaIdx(function(i){return i-1;});window.scrollTo({top:0,behavior:'smooth'});}else{setScreen('inicio');}setShowErr(false);}
  async function handleFinalizar(relato){
    setSending(true);
    var criticos=allItems.filter(function(i){return i.critico&&resps[i.id]==='nao';}).length;
    var falhas=allItems.filter(function(i){return resps[i.id]==='nao';}).length;
    var pendencias=allItems.filter(function(i){var n=negs[i.id]||{};return resps[i.id]==='nao'&&n.prox==='Sim, fica pendente';}).length;
    var statusKey=criticos>0?'critico':falhas>0?'atencao':'ok';

    var etapasConcluidas=NOITE_ETAPAS.filter(function(e){return e.itens.every(function(i){return resps[i.id];});}).length;
    await sbInsert('subger_noite_checklists',{login:user.login,user_name:user.name,turno:'noite',data:todayISO(),data_fmt:todayFmt(),hora:nowTime(),hora_inicio:horaInicio,score:score,total:totalItems,falhas:falhas,criticos:criticos,pendencias:pendencias,status:statusKey,etapas_concluidas:etapasConcluidas,resps:resps,negs:negs,relato:relato||'',sugestao:(sugestao&&sugestao.atividade?sugestao:{})});

  if(screen==='resumo'){

            {etapaIdx===0&&<button onClick={function(){if(onBack)onBack();else handleVoltar();}} style={{flexShrink:0,padding:'10px 13px',borderRadius:'var(--r8)',background:'var(--surface2)',border:'1.5px solid var(--line)',fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:700,color:'var(--ink2)',cursor:'pointer',whiteSpace:'nowrap'}}>← Início</button>}
            <button className="fab-send" onClick={handleAvancar} disabled={sending} style={{background:etapaOk?bgOk:'var(--ink3)',opacity:etapaOk?1:.45,boxShadow:etapaOk?'none':'none',transition:'all .2s'}}>
              {etapaOk
                ?(etapaIdx<NOITE_ETAPAS.length-1?'Próxima etapa →':'Resumo final 🔒')
                :(pendentesEtapa+' item'+(pendentesEtapa>1?'s':'')+' pendente'+(pendentesEtapa>1?'s':''))}
            </button>
            <button onClick={function(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({resps:resps,negs:negs,horaInicio:horaInicio}));}catch(e){}showToast('📝 Rascunho salvo.');setTimeout(function(){if(onBack)onBack();},700);}} style={{flexShrink:0,padding:'10px 13px',borderRadius:'var(--r8)',background:'var(--surface2)',border:'1.5px solid var(--line)',fontFamily:"'Sora',sans-serif",fontSize:11,fontWeight:700,color:'var(--ink2)',cursor:'pointer',whiteSpace:'nowrap'}}>⏸ Depois</button>
          </div></div>
        );
      })()}
      <div style={{height:90}}/>
    </div>
  );
}

function Login(props){
  var onLogin=props.onLogin;
  var _l=useState('');var login=_l[0];var setLogin=_l[1];
  var _p=useState('');var pwd=_p[0];var setPwd=_p[1];
  var _e=useState('');var err=_e[0];var setErr=_e[1];
  var _ld=useState(false);var loading=_ld[0];var setLoading=_ld[1];
  async function go(){
    setErr('');if(!login.trim()||!pwd.trim()){setErr('Preencha todos os campos.');return;}setLoading(true);
    var hashPw=async function(s){try{var b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0');}).join('');}catch(e){return s;}};
    var hashed=await hashPw(pwd.trim());var users=getUsers();var key=login.trim().toLowerCase();var u=users[key];
    if(!u||(u.pwd!==hashed&&u.pwd!==pwd.trim())){setErr('Login ou senha incorretos.');setLoading(false);return;}
    onLogin(u,key);setLoading(false);
  }
  return(
    <div className="login-bg">
      <div className="login-wrapper">
        <div className="login-card">
          <div className="card-top">
            <div className="card-arch-bg">
              <img src="logo.png" alt="Pastel da Camilla" style={{display:'block'}} onError={function(e){e.target.style.display='none';e.target.nextSibling.style.display='block';}}/>
              <span className="card-arch-fallback">🥟</span>
            </div>
          </div>
          <div className="card-body">
            {err&&<div className="login-alert">⚠️ {err}</div>}
            <div className="card-headline">O pessoal tá <em>ON</em> com o CheckON 🚀</div>
            <div className="card-sub">Gestão simples. Operação no controle.</div>
            <div className="login-f-group">
              <label className="login-f-label">Login</label>
              <div className="login-input-wrap"><span className="login-input-icon">👤</span><input className="login-f-input" type="text" placeholder="Seu login" value={login} onChange={function(e){setLogin(e.target.value);}} onKeyDown={function(e){if(e.key==='Enter')go();}} autoCapitalize="none" autoCorrect="off"/></div>
            </div>
            <div className="login-f-group">
              <label className="login-f-label">Senha</label>
              <div className="login-input-wrap"><span className="login-input-icon">🔒</span><input className="login-f-input" type="password" placeholder="••••••" value={pwd} onChange={function(e){setPwd(e.target.value);}} onKeyDown={function(e){if(e.key==='Enter')go();}}/></div>
            </div>
            <button className="login-btn" onClick={go} disabled={loading}>{loading?'Verificando...':'Entrar'}</button>
          </div>
        </div>
        <div className="login-footer-txt">CheckON by Pastel da Camilla</div>
      </div>
    </div>
  );
}

function App(){
  var _p=useState('loading');var phase=_p[0];var setPhase=_p[1];
  var _u=useState(null);var user=_u[0];var setUser=_u[1];
  useEffect(function(){
    var s=getSession();
    if(s){var users=getUsers();var u=users[s.key];if(u&&!u.first){setUser(u);setPhase('app');}else setPhase('login');}
    else setPhase('login');
  },[]);
  function onLogin(u,key){setUser(u);saveSession({key:key});setPhase('app');}
  function onLogout(){clearSession();setUser(null);setPhase('login');}
  if(phase==='loading'){return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#EA1D2C'}}><div style={{color:'#fff',fontFamily:"'Sora',sans-serif",fontSize:15}}>🥟 Carregando...</div></div>;}
  if(phase==='login'){return<Login onLogin={onLogin}/>;}
  if(phase==='app'){
    if(!user)return<Login onLogin={onLogin}/>;
    if(user.role==='ceo')return<CEOHub user={user} onLogout={onLogout}/>;
    if(user.role==='suporte')return<SuporteHub user={user} onLogout={onLogout}/>;
    if(user.role==='gerente')return<GerenteHub user={user} onLogout={onLogout}/>;
    if(user.role==='gerencia')return<GerenciaHub user={user} onLogout={onLogout}/>;
    if(user.role==='dp')return<DPHub user={user} onLogout={onLogout}/>;
    if(user.role==='subgerente')return<SubgerenteHub user={user} onLogout={onLogout}/>;
    if(user.role==='subgerente_noite')return<SubgerenteNoiteHub user={user} onLogout={onLogout}/>;
    return<ChecklistScreen user={user} onLogout={onLogout}/>;
  }
  return<Login onLogin={onLogin}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App,null));
</script>
